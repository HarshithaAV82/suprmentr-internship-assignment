    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Responsive Hero Page</title>
        <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2rem;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .hero-text {
            flex: 1;
            padding-right: 1rem;
        }

        .hero-text h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero-text p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .hero-text button {
            padding: 0.8rem 1.5rem;
            border: none;
            background: #fff;
            color: #333;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .hero {
            flex-direction: column;
            text-align: center;
            }

            .hero-text {
            padding: 0;
            }

            .hero-text h1 {
            font-size: 2rem;
            }
        }
        </style>
    </head>
    <body>
        <section class="hero">
        <div class="hero-text">
            <h1>Welcome to Our Site</h1>
            <p>Discover amazing product and Services tailored just for you.</p>
            <button>Get Started</button>
        </div>
        <div class="hero-image">
            <img
            src="https://static.vecteezy.com/system/resources/previews/000/640/922/original/landing-page-template-of-online-shopping-illustration-concept-modern-flat-design-concept-of-web-page-design-for-website-and-mobile-website-vector-illustration.jpg"
            alt="Hero Illustration"
            />
        </div>
        </section>
    </body>
    </html>
